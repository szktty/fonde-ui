name: fonde_ui
description: Desktop-first Flutter UI utility components with native-like interaction and zoom scaling support.
version: 0.12.0

repository: https://github.com/szktty/fonde-ui
topics:
  - widget
  - user-interface
  - design
  - components
  - desktop

environment:
  sdk: ^3.7.0
  flutter: '>=3.41.2'

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  popover: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false
  assets:
    - lib/assets/fonts/lucide.ttf
  fonts:
    - family: Lucide
      fonts:
        - asset: lib/assets/fonts/lucide.ttf
