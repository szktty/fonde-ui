name: fonde_ui
description: Desktop-first Flutter UI utility components with native-like interaction and zoom scaling support.
version: 0.9.0-dev

repository: https://github.com/szktty/fonde-ui

environment:
  sdk: ^3.7.0
  flutter: '>=3.41.2'

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  figma_squircle: ^0.6.3
  multi_split_view: ^3.3.0
  pluto_grid: ^8.0.0
  textfield_tags: ^3.0.1
  popover: ^0.4.0
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false
  assets:
    - lib/assets/fonts/lucide.ttf
  fonts:
    - family: Lucide
      fonts:
        - asset: lib/assets/fonts/lucide.ttf
