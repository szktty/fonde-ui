name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-stable-${{ hashFiles('pubspec.yaml') }}

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Dry run publish (check files & scores)
        run: dart pub publish --dry-run

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: dry-run
    environment: pub-dev

    permissions:
      id-token: write  # Required for OIDC token-based pub.dev auth
      contents: write  # Required for creating GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-stable-${{ hashFiles('pubspec.yaml') }}

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Strip the leading "v" from the tag name to get the version number
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section for this version from CHANGELOG.md
          # Collect lines between "## X.Y.Z" and the next "## " heading
          NOTES=$(awk "/^## ${VERSION}$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)

          # Write as a multiline output for GitHub Actions
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false

      - name: Publish to pub.dev
        run: dart pub publish --force
